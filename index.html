<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MEC Tracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f2ec; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #003087; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #app { display: none; max-width: 600px; margin: auto; text-align: left; }
        .item { background: white; padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 5px solid #003087; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h2>SEGAPE Login</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>

    <div id="app">
        <h1>MEC Tracker Pro</h1>
        <div class="card" style="max-width: 100%;">
            <h3>Novo Projeto</h3>
            <input type="text" id="p-name" placeholder="Nome da Publicação">
            <button onclick="addProject()">Cadastrar</button>
        </div>
        <h3>Projetos Ativos:</h3>
        <div id="list"></div>
        <button onclick="logout()" style="background:#dc3545; margin-top:20px; width:auto">Sair</button>
    </div>

    <script>
        const S_URL = 'https://ujneiupcuqiqkkltgvkv.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqbmVpdXBjdXFpcWtrbHRndmt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTY3NDAsImV4cCI6MjA5MTA3Mjc0MH0.eT_hopB6dcr-LPZwvuFpuExnR4vPehIcxcLSbagGxq0';
        const supabase = window.supabase.createClient(S_URL, S_KEY);

        async function login() {
            const { error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
            if (error) alert("Erro: " + error.message);
            else location.reload();
        }

        async function check() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                load();
            }
        }

        async function load() {
            const { data } = await supabase.from('projects').select('*').order('created_at', {ascending: false});
            document.getElementById('list').innerHTML = data.map(p => `
                <div class="item"><strong>${p.name}</strong></div>
            `).join('') || '<p>Nenhum projeto ainda.</p>';
        }

        async function addProject() {
            const name = document.getElementById('p-name').value;
            const { error } = await supabase.from('projects').insert([{ name }]);
            if (error) alert(error.message);
            else { document.getElementById('p-name').value = ''; load(); }
        }

        async function logout() { await supabase.auth.signOut(); location.reload(); }
        
        check();
    </script>
</body>
</html>
