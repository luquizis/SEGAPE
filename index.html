<body style="font-family:sans-serif; text-align:center; background:#f4f4f4; padding:50px;">
    <div style="background:white; padding:30px; display:inline-block; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1)">
        <h2>MEC Tracker - Teste de Resgate</h2>
        <input type="email" id="email" placeholder="E-mail" style="display:block; width:250px; margin:10px auto; padding:10px">
        <input type="password" id="password" placeholder="Senha" style="display:block; width:250px; margin:10px auto; padding:10px">
        <button onclick="tentarLogar()" style="padding:10px 30px; background:#003087; color:white; border:none; cursor:pointer; font-weight:bold">ENTRAR AGORA</button>
        <div id="log" style="margin-top:20px; font-size:12px; color:red; white-space:pre-wrap"></div>
    </div>

    <script>
        const S_URL = 'https://zvfwjuooztjeuokesfek.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2ZndqdW9venRqZXVva2VzZmVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODgxNjQsImV4cCI6MjA5MTA2NDE2NH0.9M6w9bnLN2DbtGGHH3yn6dYXYvupavYjrg3D1fQGE00';
        
        function escreverLog(msg) {
            document.getElementById('log').innerText += "\n" + msg;
        }

        async function tentarLogar() {
            escreverLog("Iniciando tentativa...");
            try {
                const supabase = window.supabase.createClient(S_URL, S_KEY);
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                escreverLog("Conectando ao Supabase para o email: " + email);
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });

                if (error) {
                    escreverLog("ERRO DE LOGIN: " + error.message);
                } else {
                    escreverLog("SUCESSO! Redirecionando...");
                    alert("LOGADO COM SUCESSO!");
                    // Aqui reiniciaremos a interface robusta após confirmar este passo
                }
            } catch (err) {
                escreverLog("ERRO CRÍTICO DE SCRIPT: " + err.message);
            }
        }
    </script>
</body>
</html>
