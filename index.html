<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEGAPE - Gestão de Projetos</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f3f4f6; color: #111; }
    .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .sidebar { background: #111827; color: #fff; padding: 20px; }
    .sidebar h2 { margin-bottom: 8px; }
    .sidebar p { font-size: 13px; opacity: .85; margin-bottom: 14px; }
    .nav button {
      display: block; width: 100%; margin-bottom: 8px; padding: 10px;
      border: none; border-radius: 8px; background: #1f2937; color: #fff; cursor: pointer; text-align: left;
    }
    .nav button.active { background: #2563eb; }
    .logout { margin-top: 12px; background: #dc2626 !important; }

    .main { padding: 20px; }
    .card {
      background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input, select {
      padding: 10px; border: 1px solid #ddd; border-radius: 8px; min-width: 220px;
    }
    button.action {
      padding: 10px 14px; border: none; border-radius: 8px; background: #2563eb; color: #fff; cursor: pointer;
    }
    button.secondary { background: #6b7280; }

    .list-item {
      padding: 10px; border: 1px solid #ececec; border-radius: 8px; margin-bottom: 8px; cursor: pointer;
    }
    .list-item:hover { background: #f9fafb; }

    .muted { color: #6b7280; font-size: 13px; }
    .ok { color: #16a34a; }
    .err { color: #dc2626; }

    #pdf-container { margin-top: 12px; display: flex; flex-direction: column; gap: 16px; align-items: start; }
    .pdf-page { position: relative; box-shadow: 0 2px 10px rgba(0,0,0,.2); background: #fff; cursor: crosshair; }
    .pin {
      position: absolute; width: 16px; height: 16px; background: #ef4444;
      border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%);
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
    }
    .pin.done { background: #22c55e; }

    .hidden { display: none; }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: sticky; top: 0; z-index: 2; }
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h2>📊 SEGAPE</h2>
    <p id="user-label">Não autenticado</p>

    <div class="nav">
      <button id="nav-auth" class="active">🔐 Login</button>
      <button id="nav-dash">📈 Dashboard</button>
      <button id="nav-project">📁 Projeto Atual</button>
      <button id="nav-checklist">✅ Checklist</button>
      <button id="nav-indicators">💾 Indicadores</button>
      <button id="btn-logout" class="logout hidden">Sair</button>
    </div>
  </aside>

  <main class="main">
    <!-- AUTH -->
    <section id="view-auth" class="card">
      <h3>Login por e-mail</h3>
      <div class="row" style="margin-top:10px;">
        <input id="auth-email" type="email" placeholder="seu@email.com" />
        <input id="auth-password" type="password" placeholder="senha (mín. 6)" />
        <button class="action" id="btn-signup">Criar conta</button>
        <button class="action secondary" id="btn-login">Entrar</button>
      </div>
      <p id="auth-msg" class="muted" style="margin-top:10px;">Aguardando...</p>
    </section>

    <!-- DASHBOARD -->
    <section id="view-dash" class="card hidden">
      <h3>Projetos</h3>
      <div class="row" style="margin: 10px 0;">
        <input id="new-project-id" placeholder="id projeto (ex: atm)" />
        <input id="new-project-name" placeholder="nome projeto" />
        <input id="new-project-color" placeholder="#2B7FDD" />
        <button class="action" id="btn-create-project">Criar projeto</button>
      </div>
      <div id="projects-list"></div>
    </section>

    <!-- PROJETO -->
    <section id="view-project" class="card hidden">
      <h3>Projeto atual: <span id="current-project-label">-</span></h3>

      <div class="card" style="margin-top:12px;">
        <h4>Versões</h4>
        <div class="row" style="margin-top:10px;">
          <input id="new-version-tag" placeholder="ex: v1.0" />
          <button class="action" id="btn-create-version">Nova versão</button>
        </div>
        <div id="versions-list" style="margin-top:10px;"></div>
      </div>

      <div class="card">
        <h4>PDF da versão atual: <span id="current-version-label">-</span></h4>
        <div class="row" style="margin-top:10px;">
          <input id="pdf-upload" type="file" accept=".pdf" />
          <button class="action secondary" id="btn-reload-pdf">Recarregar PDF</button>
        </div>
        <p class="muted" style="margin-top:8px;">Clique no PDF para criar tarefa (pin).</p>
        <div id="pdf-container"></div>
      </div>

      <div class="card">
        <h4>Tarefas da versão</h4>
        <div id="tasks-list"></div>
      </div>
    </section>

    <!-- CHECKLIST -->
    <section id="view-checklist" class="card hidden">
      <h3>Checklist do projeto atual</h3>
      <p class="muted">Projeto: <span id="checklist-project-label">-</span></p>
      <div id="checklist-list" style="margin-top:10px;"></div>
    </section>

    <!-- INDICATORS -->
    <section id="view-indicators" class="card hidden">
      <h3>Indicadores (Data Lake)</h3>
      <p class="muted">Projeto: <span id="indicator-project-label">-</span></p>
      <div class="row" style="margin-top:10px;">
        <input id="indicator-name" placeholder="Nome do indicador" />
        <input id="indicator-page" placeholder="Página (número)" />
        <input id="indicator-sheet" placeholder="Planilha/Data lake" />
        <button class="action" id="btn-add-indicator">Adicionar</button>
      </div>
      <div id="indicators-list" style="margin-top:10px;"></div>
    </section>
  </main>
</div>

<script>
  // =========================
  // CONFIG
  // =========================
  const SUPABASE_URL = 'https://SEU-PROJETO.supabase.co';
  const SUPABASE_ANON_KEY = 'SUA_ANON_KEY_PUBLICA';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // =========================
  // STATE
  // =========================
  let session = null;
  let projects = [];
  let versions = [];
  let tasks = [];
  let checklists = [];
  let indicators = [];
  let currentProjectId = null;
  let currentVersionId = null;
  let currentPdfUrl = null;
  let pdfDoc = null;

  // =========================
  // ELEMENTS
  // =========================
  const el = {
    userLabel: document.getElementById('user-label'),
    authMsg: document.getElementById('auth-msg'),

    navAuth: document.getElementById('nav-auth'),
    navDash: document.getElementById('nav-dash'),
    navProject: document.getElementById('nav-project'),
    navChecklist: document.getElementById('nav-checklist'),
    navIndicators: document.getElementById('nav-indicators'),
    btnLogout: document.getElementById('btn-logout'),

    viewAuth: document.getElementById('view-auth'),
    viewDash: document.getElementById('view-dash'),
    viewProject: document.getElementById('view-project'),
    viewChecklist: document.getElementById('view-checklist'),
    viewIndicators: document.getElementById('view-indicators'),

    authEmail: document.getElementById('auth-email'),
    authPassword: document.getElementById('auth-password'),
    btnSignup: document.getElementById('btn-signup'),
    btnLogin: document.getElementById('btn-login'),

    newProjectId: document.getElementById('new-project-id'),
    newProjectName: document.getElementById('new-project-name'),
    newProjectColor: document.getElementById('new-project-color'),
    btnCreateProject: document.getElementById('btn-create-project'),
    projectsList: document.getElementById('projects-list'),

    currentProjectLabel: document.getElementById('current-project-label'),
    checklistProjectLabel: document.getElementById('checklist-project-label'),
    indicatorProjectLabel: document.getElementById('indicator-project-label'),

    newVersionTag: document.getElementById('new-version-tag'),
    btnCreateVersion: document.getElementById('btn-create-version'),
    versionsList: document.getElementById('versions-list'),
    currentVersionLabel: document.getElementById('current-version-label'),

    pdfUpload: document.getElementById('pdf-upload'),
    btnReloadPdf: document.getElementById('btn-reload-pdf'),
    pdfContainer: document.getElementById('pdf-container'),

    tasksList: document.getElementById('tasks-list'),

    checklistList: document.getElementById('checklist-list'),

    indicatorName: document.getElementById('indicator-name'),
    indicatorPage: document.getElementById('indicator-page'),
    indicatorSheet: document.getElementById('indicator-sheet'),
    btnAddIndicator: document.getElementById('btn-add-indicator'),
    indicatorsList: document.getElementById('indicators-list'),
  };

  // =========================
  // HELPERS
  // =========================
  function setAuthMsg(msg, isError = false) {
    el.authMsg.textContent = msg;
    el.authMsg.className = isError ? 'err' : 'ok';
  }

  function setActiveNav(btn) {
    [el.navAuth, el.navDash, el.navProject, el.navChecklist, el.navIndicators].forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function showView(name) {
    el.viewAuth.classList.add('hidden');
    el.viewDash.classList.add('hidden');
    el.viewProject.classList.add('hidden');
    el.viewChecklist.classList.add('hidden');
    el.viewIndicators.classList.add('hidden');

    if (name === 'auth') el.viewAuth.classList.remove('hidden');
    if (name === 'dash') el.viewDash.classList.remove('hidden');
    if (name === 'project') el.viewProject.classList.remove('hidden');
    if (name === 'checklist') el.viewChecklist.classList.remove('hidden');
    if (name === 'indicators') el.viewIndicators.classList.remove('hidden');
  }

  function requireLogin() {
    if (!session) {
      alert('Faça login primeiro.');
      setActiveNav(el.navAuth);
      showView('auth');
      return false;
    }
    return true;
  }

  // =========================
  // AUTH
  // =========================
  async function doSignUp() {
    const email = el.authEmail.value.trim();
    const password = el.authPassword.value.trim();
    if (!email || !password) return setAuthMsg('Informe e-mail e senha.', true);

    const { error } = await sb.auth.signUp({ email, password });
    if (error) return setAuthMsg(error.message, true);
    setAuthMsg('Conta criada. Verifique o e-mail (se confirmação estiver ativa).');
  }

  async function doLogin() {
    const email = el.authEmail.value.trim();
    const password = el.authPassword.value.trim();
    if (!email || !password) return setAuthMsg('Informe e-mail e senha.', true);

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) return setAuthMsg(error.message, true);

    await refreshSession();
    setAuthMsg('Login realizado com sucesso.');
    await loadProjects();
    setActiveNav(el.navDash);
    showView('dash');
  }

  async function doLogout() {
    await sb.auth.signOut();
    await refreshSession();
    setActiveNav(el.navAuth);
    showView('auth');
  }

  async function refreshSession() {
    const { data } = await sb.auth.getSession();
    session = data.session || null;

    if (session?.user) {
      el.userLabel.textContent = `👤 ${session.user.email}`;
      el.btnLogout.classList.remove('hidden');
    } else {
      el.userLabel.textContent = 'Não autenticado';
      el.btnLogout.classList.add('hidden');
    }
  }

  // =========================
  // PROJECTS
  // =========================
  async function loadProjects() {
    if (!requireLogin()) return;
    const { data, error } = await sb.from('projects').select('*').order('name');
    if (error) return alert('Erro projetos: ' + error.message);

    projects = data || [];
    renderProjects();
  }

  function renderProjects() {
    if (projects.length === 0) {
      el.projectsList.innerHTML = `<p class="muted">Nenhum projeto.</p>`;
      return;
    }

    el.projectsList.innerHTML = projects.map(p => `
      <div class="list-item" data-project-id="${p.id}">
        <strong>${p.name}</strong> <span class="muted">(${p.id})</span>
      </div>
    `).join('');

    document.querySelectorAll('[data-project-id]').forEach(item => {
      item.addEventListener('click', async () => {
        currentProjectId = item.getAttribute('data-project-id');
        currentVersionId = null;
        currentPdfUrl = null;
        el.currentProjectLabel.textContent = currentProjectId;
        el.checklistProjectLabel.textContent = currentProjectId;
        el.indicatorProjectLabel.textContent = currentProjectId;
        el.currentVersionLabel.textContent = '-';
        el.pdfContainer.innerHTML = '';
        await loadVersions();
        await loadChecklists();
        await loadIndicators();
        setActiveNav(el.navProject);
        showView('project');
      });
    });
  }

  async function createProject() {
    if (!requireLogin()) return;
    const id = el.newProjectId.value.trim().toLowerCase();
    const name = el.newProjectName.value.trim();
    const color = el.newProjectColor.value.trim() || '#2B7FDD';

    if (!id || !name) return alert('Informe ID e nome do projeto.');

    const { error } = await sb.from('projects').insert([{
      id, name, color, created_at: new Date().toISOString()
    }]);

    if (error) return alert('Erro criar projeto: ' + error.message);

    // adiciona o próprio usuário no projeto
    await sb.rpc('add_me_to_project', { p_project_id: id, p_role: 'owner' });

    el.newProjectId.value = '';
    el.newProjectName.value = '';
    el.newProjectColor.value = '';
    await loadProjects();
  }

  // =========================
  // VERSIONS
  // =========================
  async function loadVersions() {
    if (!currentProjectId) return;
    const { data, error } = await sb.from('project_versions')
      .select('*')
      .eq('project_id', currentProjectId)
      .order('created_at', { ascending: false });

    if (error) return alert('Erro versões: ' + error.message);

    versions = data || [];
    renderVersions();
  }

  function renderVersions() {
    if (versions.length === 0) {
      el.versionsList.innerHTML = `<p class="muted">Nenhuma versão.</p>`;
      return;
    }

    el.versionsList.innerHTML = versions.map(v => `
      <div class="list-item" data-version-id="${v.id}">
        <strong>${v.version_tag}</strong>
        <span class="muted"> | ${new Date(v.created_at).toLocaleString()}</span>
        ${v.pdf_url ? '<span class="ok"> | 📎 PDF</span>' : '<span class="muted"> | sem PDF</span>'}
      </div>
    `).join('');

    document.querySelectorAll('[data-version-id]').forEach(item => {
      item.addEventListener('click', async () => {
        currentVersionId = item.getAttribute('data-version-id');
        el.currentVersionLabel.textContent = currentVersionId;
        const v = versions.find(x => x.id === currentVersionId);
        currentPdfUrl = v?.pdf_url || null;
        if (currentPdfUrl) await loadPDF(currentPdfUrl);
        await loadTasks();
      });
    });
  }

  async function createVersion() {
    if (!currentProjectId) return alert('Selecione um projeto.');
    const tag = el.newVersionTag.value.trim();
    if (!tag) return alert('Informe a tag da versão.');

    const { data, error } = await sb.from('project_versions').insert([{
      project_id: currentProjectId,
      version_tag: tag,
      created_by: session?.user?.email || 'Usuário',
      created_at: new Date().toISOString()
    }]).select();

    if (error) return alert('Erro criar versão: ' + error.message);

    el.newVersionTag.value = '';
    await loadVersions();
    if (data?.[0]) {
      currentVersionId = data[0].id;
      el.currentVersionLabel.textContent = currentVersionId;
    }
  }

  // =========================
  // PDF + TASKS
  // =========================
  async function uploadPDF(file) {
    if (!currentProjectId || !currentVersionId) return alert('Selecione projeto e versão.');
    const path = `${currentProjectId}/${currentVersionId}/${file.name}`;

    const up = await sb.storage.from('pdfs').upload(path, file, { upsert: true });
    if (up.error) return alert('Erro upload PDF: ' + up.error.message);

    const { data } = sb.storage.from('pdfs').getPublicUrl(path);
    const url = data.publicUrl;

    const { error } = await sb.from('project_versions').update({ pdf_url: url }).eq('id', currentVersionId);
    if (error) return alert('Erro salvar URL PDF: ' + error.message);

    currentPdfUrl = url;
    await loadVersions();
    await loadPDF(url);
  }

  async function loadPDF(url) {
    try {
      const task = pdfjsLib.getDocument(url);
      pdfDoc = await task.promise;
      await renderPDF();
    } catch (e) {
      alert('Erro carregar PDF: ' + e.message);
    }
  }

  async function renderPDF() {
    const c = el.pdfContainer;
    c.innerHTML = '';
    if (!pdfDoc) return;

    for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
      const page = await pdfDoc.getPage(pageNum);
      const viewport = page.getViewport({ scale: 1.2 });

      const pageDiv = document.createElement('div');
      pageDiv.className = 'pdf-page';
      pageDiv.dataset.page = pageNum;
      pageDiv.style.width = viewport.width + 'px';
      pageDiv.style.height = viewport.height + 'px';

      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({
        canvasContext: canvas.getContext('2d'),
        viewport
      }).promise;

      pageDiv.appendChild(canvas);

      pageDiv.addEventListener('click', async (e) => {
        if (!currentVersionId || !currentProjectId) return;
        const text = prompt('Descrição da tarefa:');
        if (!text) return;

        const rect = pageDiv.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        const y = (e.clientY - rect.top) / rect.height;

        const { error } = await sb.from('tasks').insert([{
          project_id: currentProjectId,
          version_id: currentVersionId,
          task_text: text,
          type: 'tarefa',
          area: 'geral',
          page: pageNum,
          x_pos: x,
          y_pos: y,
          priority: 'media',
          is_done: false,
          created_by: session?.user?.email || 'Usuário',
          created_at: new Date().toISOString()
        }]);

        if (error) return alert('Erro criar tarefa: ' + error.message);
        await loadTasks();
      });

      c.appendChild(pageDiv);
    }

    renderPins();
  }

  async function loadTasks() {
    if (!currentVersionId) return;
    const { data, error } = await sb.from('tasks')
      .select('*')
      .eq('version_id', currentVersionId)
      .order('created_at', { ascending: false });

    if (error) return alert('Erro tarefas: ' + error.message);
    tasks = data || [];
    renderTasks();
    renderPins();
  }

  function renderTasks() {
    if (tasks.length === 0) {
      el.tasksList.innerHTML = `<p class="muted">Sem tarefas nesta versão.</p>`;
      return;
    }

    el.tasksList.innerHTML = tasks.map(t => `
      <div class="list-item">
        <strong>${t.task_text}</strong>
        <div class="muted">página ${t.page || '-'} | prioridade ${t.priority || '-'} | ${t.is_done ? '✅ concluída' : '⏳ pendente'}</div>
        <button class="action secondary" data-toggle-task="${t.id}" style="margin-top:8px;">
          Marcar como ${t.is_done ? 'pendente' : 'concluída'}
        </button>
      </div>
    `).join('');

    document.querySelectorAll('[data-toggle-task]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = Number(btn.getAttribute('data-toggle-task'));
        const item = tasks.find(x => x.id === id);
        if (!item) return;

        const { error } = await sb.from('tasks')
          .update({
            is_done: !item.is_done,
            checked_by: session?.user?.email || 'Usuário',
            checked_at: new Date().toISOString()
          })
          .eq('id', id);

        if (error) return alert('Erro atualizar tarefa: ' + error.message);
        await loadTasks();
      });
    });
  }

  function renderPins() {
    document.querySelectorAll('.pin').forEach(p => p.remove());

    tasks.forEach(t => {
      const pageDiv = document.querySelector(`.pdf-page[data-page="${t.page}"]`);
      if (!pageDiv) return;

      const pin = document.createElement('div');
      pin.className = `pin ${t.is_done ? 'done' : ''}`;
      pin.style.left = (t.x_pos * 100) + '%';
      pin.style.top = (t.y_pos * 100) + '%';
      pin.title = t.task_text;
      pageDiv.appendChild(pin);
    });
  }

  // =========================
  // CHECKLIST
  // =========================
  async function loadChecklists() {
    if (!currentProjectId) return;
    const { data, error } = await sb.from('checklists')
      .select('*')
      .eq('project_id', currentProjectId)
      .order('area', { ascending: true });

    if (error) return alert('Erro checklist: ' + error.message);
    checklists = data || [];
    renderChecklists();
  }

  function renderChecklists() {
    if (!currentProjectId) {
      el.checklistList.innerHTML = '<p class="muted">Selecione um projeto.</p>';
      return;
    }
    if (checklists.length === 0) {
      el.checklistList.innerHTML = '<p class="muted">Nenhum item de checklist.</p>';
      return;
    }

    el.checklistList.innerHTML = checklists.map(c => `
      <div class="list-item">
        <label class="row">
          <input type="checkbox" data-check-id="${c.id}" ${c.is_checked ? 'checked' : ''} />
          <strong>${c.item}</strong>
          <span class="muted">(${c.area || 'geral'})</span>
        </label>
      </div>
    `).join('');

    document.querySelectorAll('[data-check-id]').forEach(chk => {
      chk.addEventListener('change', async () => {
        const id = chk.getAttribute('data-check-id');
        const current = checklists.find(x => x.id === id);
        if (!current) return;

        const { error } = await sb.from('checklists').update({
          is_checked: !current.is_checked,
          checked_by: session?.user?.email || 'Usuário',
          checked_at: new Date().toISOString()
        }).eq('id', id);

        if (error) return alert('Erro atualizar checklist: ' + error.message);
        await loadChecklists();
      });
    });
  }

  // =========================
  // INDICATORS
  // =========================
  async function loadIndicators() {
    if (!currentProjectId) return;
    const { data, error } = await sb.from('project_indicators')
      .select('*')
      .eq('project_id', currentProjectId)
      .order('created_at', { ascending: false });

    if (error) return alert('Erro indicadores: ' + error.message);
    indicators = data || [];
    renderIndicators();
  }

  async function addIndicator() {
    if (!currentProjectId) return alert('Selecione um projeto.');
    const name = el.indicatorName.value.trim();
    const page = parseInt(el.indicatorPage.value.trim(), 10);
    const sheet = el.indicatorSheet.value.trim();

    if (!name) return alert('Informe o nome do indicador.');

    const { error } = await sb.from('project_indicators').insert([{
      project_id: currentProjectId,
      indicator_name: name,
      page: Number.isNaN(page) ? null : page,
      spreadsheet_lake: sheet || null,
      created_at: new Date().toISOString()
    }]);

    if (error) return alert('Erro adicionar indicador: ' + error.message);

    el.indicatorName.value = '';
    el.indicatorPage.value = '';
    el.indicatorSheet.value = '';
    await loadIndicators();
  }

  function renderIndicators() {
    if (!currentProjectId) {
      el.indicatorsList.innerHTML = '<p class="muted">Selecione um projeto.</p>';
      return;
    }
    if (indicators.length === 0) {
      el.indicatorsList.innerHTML = '<p class="muted">Sem indicadores.</p>';
      return;
    }

    el.indicatorsList.innerHTML = indicators.map(i => `
      <div class="list-item">
        <strong>${i.indicator_name}</strong>
        <div class="muted">Página: ${i.page ?? '-'} | Planilha: ${i.spreadsheet_lake ?? '-'}</div>
      </div>
    `).join('');
  }

  // =========================
  // NAV
  // =========================
  el.navAuth.addEventListener('click', () => { setActiveNav(el.navAuth); showView('auth'); });
  el.navDash.addEventListener('click', async () => {
    if (!requireLogin()) return;
    await loadProjects();
    setActiveNav(el.navDash);
    showView('dash');
  });
  el.navProject.addEventListener('click', () => {
    if (!requireLogin()) return;
    setActiveNav(el.navProject);
    showView('project');
  });
  el.navChecklist.addEventListener('click', async () => {
    if (!requireLogin()) return;
    await loadChecklists();
    setActiveNav(el.navChecklist);
    showView('checklist');
  });
  el.navIndicators.addEventListener('click', async () => {
    if (!requireLogin()) return;
    await loadIndicators();
    setActiveNav(el.navIndicators);
    showView('indicators');
  });

  // =========================
  // EVENTS
  // =========================
  el.btnSignup.addEventListener('click', doSignUp);
  el.btnLogin.addEventListener('click', doLogin);
  el.btnLogout.addEventListener('click', doLogout);

  el.btnCreateProject.addEventListener('click', createProject);
  el.btnCreateVersion.addEventListener('click', createVersion);

  el.pdfUpload.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (file) await uploadPDF(file);
  });

  el.btnReloadPdf.addEventListener('click', async () => {
    if (currentPdfUrl) await loadPDF(currentPdfUrl);
  });

  el.btnAddIndicator.addEventListener('click', addIndicator);

  // =========================
  // INIT
  // =========================
  async function init() {
    await refreshSession();
    if (session) {
      await loadProjects();
      setActiveNav(el.navDash);
      showView('dash');
      setAuthMsg('Sessão ativa.');
    } else {
      setActiveNav(el.navAuth);
      showView('auth');
      setAuthMsg('Faça login para continuar.');
    }

    sb.auth.onAuthStateChange(async () => {
      await refreshSession();
      if (session) {
        await loadProjects();
        setActiveNav(el.navDash);
        showView('dash');
      } else {
        setActiveNav(el.navAuth);
        showView('auth');
      }
    });
  }

  init();
</script>
</body>
</html>
