<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEC Tracker Pro — SEGAPE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pri: #003087; --bg: #f4f2ec; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: var(--pri); color: white; }
        #app-content { display: none; max-width: 800px; margin: auto; }
        .proj-item { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid var(--pri); cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-section" class="card">
        <h2 style="color:var(--pri)">SEGAPE Login</h2>
        <input type="email" id="email" placeholder="E-mail institucional">
        <input type="password" id="password" placeholder="Senha">
        <button onclick="handleLogin()">Entrar no Sistema</button>
    </div>

    <div id="app-content">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h1>MEC Tracker Pro</h1>
            <button onclick="logout()" style="width:auto; background:#dc3545;">Sair</button>
        </div>

        <div class="card" style="max-width: 100%; text-align: left;">
            <h3>Novo Projeto</h3>
            <input type="text" id="proj-name" placeholder="Nome da Publicação">
            <button onclick="createProject()">Cadastrar Projeto</button>
        </div>

        <h3>Projetos Ativos</h3>
        <div id="project-list"></div>
    </div>

    <script>
        const S_URL = 'https://zvfwjuooztjeuokesfek.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2ZndqdW9venRqZXVva2VzZmVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODgxNjQsImV4cCI6MjA5MTA2NDE2NH0.9M6w9bnLN2DbtGGHH3yn6dYXYvupavYjrg3D1fQGE00';
        const supabase = window.supabase.createClient(S_URL, S_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert("Erro: " + error.message);
            else checkSession();
        }

        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                loadProjects();
            }
        }

        async function loadProjects() {
            const { data, error } = await supabase.from('projects').select('*').order('created_at', {ascending: false});
            if (error) { console.error(error); return; }
            document.getElementById('project-list').innerHTML = data.map(p => `
                <div class="proj-item">
                    <strong>${p.name}</strong><br><small>Criado em: ${new Date(p.created_at).toLocaleDateString()}</small>
                </div>
            `).join('') || '<p>Nenhum projeto encontrado.</p>';
        }

        async function createProject() {
            const name = document.getElementById('proj-name').value;
            if (!name) return alert("Digite o nome!");
            const { error } = await supabase.from('projects').insert([{ name: name }]);
            if (error) alert("Erro: " + error.message);
            else { 
                document.getElementById('proj-name').value = '';
                loadProjects(); 
            }
        }

        async function logout() { await supabase.auth.signOut(); location.reload(); }

        window.onload = checkSession;
    </script>
</body>
</html>
