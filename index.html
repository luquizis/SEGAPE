<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEC Tracker — Publicações Educacionais</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-main: 'Sora', sans-serif;
  --font-mono: 'DM Mono', monospace;

  --c-bg:       #F5F3EE;
  --c-surface:  #FFFFFF;
  --c-border:   #E2DEDA;
  --c-border2:  #C8C3BC;
  --c-text:     #1A1714;
  --c-text2:    #6B6560;
  --c-text3:    #9E9890;

  --c-design:   #4A3F9F;
  --c-design-bg:#EEEDFB;
  --c-front:    #0D6B4F;
  --c-front-bg: #E1F5EE;
  --c-back:     #7A4A0A;
  --c-back-bg:  #FDF0DC;
  --c-text-c:   #14548A;
  --c-text-cbg: #E4F1FA;
  --c-sup:      #4A4845;
  --c-sup-bg:   #F0EDE8;
  --c-aprov:    #8A2252;
  --c-aprov-bg: #FAE8F2;
  --c-dados:    #8A2A1A;
  --c-dados-bg: #FAECE7;

  --c-wait:     #B0AAA3;
  --c-doing:    #2B7FDD;
  --c-block:    #D83A3A;
  --c-done:     #1D9E75;
  --c-pending:  #C07A10;

  --c-atm:   #1D9E75;
  --c-ats:   #2B7FDD;
  --c-atso:  #C07A10;
  --c-atmeq: #D85A30;

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;

  --sidebar-w: 210px;
  --topbar-h: 56px;
  --transition: 0.15s ease;
}

body {
  font-family: var(--font-main);
  background: var(--c-bg);
  color: var(--c-text);
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── Layout Shell ──────────────────────────────── */
#shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ─── Sidebar ───────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--c-surface);
  border-right: 1px solid var(--c-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  z-index: 10;
}

.sb-header {
  padding: 22px 18px 18px;
  border-bottom: 1px solid var(--c-border);
}

.sb-wordmark {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 2px;
}

.sb-wordmark strong {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--c-text);
}

.sb-wordmark span {
  font-size: 10px;
  font-weight: 400;
  color: var(--c-text3);
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.sb-sub {
  font-size: 10px;
  color: var(--c-text3);
  margin-top: 1px;
}

.sb-section {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--c-text3);
  padding: 14px 18px 5px;
}

.sb-nav {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px;
}

.sb-nav::-webkit-scrollbar { width: 3px; }
.sb-nav::-webkit-scrollbar-thumb { background: var(--c-border2); border-radius: 2px; }

.nav-proj {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background var(--transition);
  margin-bottom: 1px;
  position: relative;
}

.nav-proj:hover { background: var(--c-bg); }

.nav-proj.active {
  background: var(--c-bg);
}

.nav-proj.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 18px;
  border-radius: 0 3px 3px 0;
  background: var(--proj-color, var(--c-text));
}

.proj-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.proj-name {
  font-size: 12px;
  font-weight: 500;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.proj-badge {
  font-size: 9px;
  font-family: var(--font-mono);
  background: #FBDADA;
  color: #8A2020;
  padding: 1px 6px;
  border-radius: 20px;
  font-weight: 500;
  min-width: 18px;
  text-align: center;
}

.divider { height: 1px; background: var(--c-border); margin: 8px 18px; }

.nav-member {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background var(--transition);
  margin-bottom: 1px;
}

.nav-member:hover { background: var(--c-bg); }
.nav-member.active { background: var(--c-bg); }

.nav-member .m-name {
  font-size: 12px;
  font-weight: 500;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nav-member .m-role {
  font-size: 9px;
  color: var(--c-text3);
  white-space: nowrap;
}

.avatar {
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  flex-shrink: 0;
  font-size: 9px;
  letter-spacing: 0;
}

.sb-footer {
  border-top: 1px solid var(--c-border);
  padding: 12px 14px;
}

.me-card {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  background: var(--c-bg);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background var(--transition);
}

.me-card:hover { background: var(--c-border); }

.me-info { flex: 1; min-width: 0; }
.me-info .me-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.me-info .me-role { font-size: 10px; color: var(--c-text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ─── Main ──────────────────────────────────────── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ─── Topbar ────────────────────────────────────── */
#topbar {
  height: var(--topbar-h);
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 14px;
  flex-shrink: 0;
}

.tb-project-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.tb-title {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.2px;
}

.tb-ver {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--c-text3);
  background: var(--c-bg);
  padding: 3px 9px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--c-border);
  white-space: nowrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border-radius: var(--radius-md);
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-main);
  cursor: pointer;
  border: 1px solid var(--c-border2);
  background: var(--c-surface);
  color: var(--c-text);
  transition: all var(--transition);
  white-space: nowrap;
}

.btn:hover { background: var(--c-bg); border-color: var(--c-text3); }

.btn-primary {
  background: var(--c-text);
  color: var(--c-surface);
  border-color: var(--c-text);
}

.btn-primary:hover { background: #2D2925; border-color: #2D2925; }

/* ─── Content Area ──────────────────────────────── */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 22px 24px;
}

#content::-webkit-scrollbar { width: 5px; }
#content::-webkit-scrollbar-thumb { background: var(--c-border2); border-radius: 3px; }

.layout-cols {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}

.col-main { flex: 1; min-width: 0; }
.col-side { width: 244px; min-width: 244px; display: flex; flex-direction: column; gap: 14px; }

/* ─── Cards ─────────────────────────────────────── */
.card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-bottom: 14px;
}

.card-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--c-text3);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ─── Doc Header ────────────────────────────────── */
.doc-header {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}

.doc-thumb {
  width: 58px;
  height: 74px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--c-border);
  overflow: hidden;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}

.doc-thumb-top {
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 8px;
  font-weight: 500;
}

.doc-thumb-lines {
  flex: 1;
  padding: 5px 6px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.dl { height: 2px; border-radius: 1px; background: var(--c-border); }

.doc-info { flex: 1; min-width: 0; }

.doc-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
  margin-bottom: 4px;
  line-height: 1.3;
}

.doc-desc {
  font-size: 11px;
  color: var(--c-text2);
  line-height: 1.55;
  margin-bottom: 10px;
}

.doc-tags { display: flex; gap: 5px; flex-wrap: wrap; }

.tag {
  font-size: 10px;
  font-family: var(--font-mono);
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid var(--c-border);
  color: var(--c-text2);
  background: var(--c-bg);
}

.doc-stats {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
  min-width: 90px;
}

.stat-item { text-align: right; }
.stat-label { font-size: 9px; color: var(--c-text3); text-transform: uppercase; letter-spacing: 0.06em; display: block; }
.stat-val { font-size: 20px; font-weight: 600; letter-spacing: -1px; font-family: var(--font-mono); line-height: 1; }

/* ─── Pipeline ──────────────────────────────────── */
.pipeline {
  display: flex;
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 14px;
  background: var(--c-surface);
}

.pipe-stage {
  flex: 1;
  min-width: 0;
  padding: 11px 13px;
  cursor: pointer;
  border-right: 1px solid var(--c-border);
  position: relative;
  transition: background var(--transition);
}

.pipe-stage:last-child { border-right: none; }
.pipe-stage:hover { background: var(--c-bg); }

.pipe-stage.active {
  background: var(--c-bg);
}

.pipe-stage.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--c-text);
}

.ps-num {
  font-size: 9px;
  font-family: var(--font-mono);
  color: var(--c-text3);
  margin-bottom: 3px;
}

.ps-name {
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--c-text2);
}

.pipe-stage.active .ps-name { color: var(--c-text); }

.ps-status {
  display: flex;
  align-items: center;
  gap: 4px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-dot.wait    { background: var(--c-wait); }
.status-dot.doing   { background: var(--c-doing); }
.status-dot.block   { background: var(--c-block); }
.status-dot.done    { background: var(--c-done); }
.status-dot.pending { background: var(--c-pending); }

.ps-status span {
  font-size: 9px;
  color: var(--c-text3);
  white-space: nowrap;
  overflow: hidden;
}

.ps-avatars {
  display: flex;
  margin-top: 6px;
}

.ps-av {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--c-surface);
  font-size: 7px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: -4px;
}

.ps-av:first-child { margin-left: 0; }

/* ─── Stage Detail ──────────────────────────────── */
.stage-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.stage-num-badge {
  font-size: 9px;
  font-family: var(--font-mono);
  font-weight: 500;
  color: var(--c-text3);
  background: var(--c-bg);
  border: 1px solid var(--c-border);
  padding: 3px 8px;
  border-radius: var(--radius-sm);
}

.stage-name {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
  letter-spacing: -0.2px;
}

.stage-count {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--c-text3);
}

.stage-owner-tag {
  font-size: 10px;
  color: var(--c-text2);
  background: var(--c-bg);
  border: 1px solid var(--c-border);
  padding: 3px 10px;
  border-radius: 20px;
}

/* ─── Notice Bars ───────────────────────────────── */
.notice {
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 9px 12px;
  margin-bottom: 12px;
  font-size: 11px;
  line-height: 1.45;
  border-left: 3px solid;
}

.notice.blocked  { background: #FDF2F2; border-color: var(--c-block); color: #7A2020; }
.notice.ready    { background: #F0FAF5; border-color: var(--c-done); color: #0D5A3A; }
.notice.approval { background: #FDF5E8; border-color: var(--c-pending); color: #6B4000; }

.notice strong { font-weight: 600; }

/* ─── Status Pills ──────────────────────────────── */
.status-pills {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.sp {
  font-size: 10px;
  font-weight: 500;
  padding: 4px 11px;
  border-radius: 20px;
  cursor: pointer;
  border: 1px solid var(--c-border);
  color: var(--c-text3);
  background: var(--c-surface);
  transition: all var(--transition);
  font-family: var(--font-main);
}

.sp:hover { border-color: var(--c-text3); }

.sp.sel-wait    { background: #F4F2EE; color: var(--c-sup); border-color: #C8C3BC; }
.sp.sel-doing   { background: #E4EFFA; color: #1A5FA0; border-color: #8ABFE8; }
.sp.sel-block   { background: #FAE8E8; color: #882020; border-color: #ECA0A0; }
.sp.sel-done    { background: #E0F5EE; color: #0D6040; border-color: #6DD4AC; }
.sp.sel-pending { background: #FDF0DC; color: #7A4A0A; border-color: #E8B870; }

/* ─── Legend ────────────────────────────────────── */
.role-legend {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--c-border);
}

.rl {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--c-text2);
}

.rl-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ─── Section Label ─────────────────────────────── */
.sect-lbl {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--c-text3);
  margin: 10px 0 6px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--c-border);
}

.sect-lbl:first-of-type { margin-top: 0; }

/* ─── Tasks ─────────────────────────────────────── */
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 9px 11px;
  border-radius: var(--radius-md);
  margin-bottom: 4px;
  transition: opacity var(--transition);
}

.task-item.ti-design  { background: var(--c-design-bg); }
.task-item.ti-front   { background: var(--c-front-bg); }
.task-item.ti-back    { background: var(--c-back-bg); }
.task-item.ti-dados   { background: var(--c-dados-bg); }
.task-item.ti-text    { background: var(--c-text-cbg); }
.task-item.ti-sup     { background: var(--c-sup-bg); }
.task-item.ti-aprov   { background: var(--c-aprov-bg); }

.chk {
  width: 14px;
  height: 14px;
  border-radius: 4px;
  border: 1.5px solid;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}

.ti-design .chk  { border-color: var(--c-design); }
.ti-front .chk   { border-color: var(--c-front); }
.ti-back .chk    { border-color: var(--c-back); }
.ti-dados .chk   { border-color: var(--c-dados); }
.ti-text .chk    { border-color: var(--c-text-c); }
.ti-sup .chk     { border-color: var(--c-sup); }
.ti-aprov .chk   { border-color: var(--c-aprov); }

.chk.done { background: currentColor; border-color: currentColor; }
.chk.done::after {
  content: '';
  display: block;
  width: 4px;
  height: 7px;
  border: 1.5px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(45deg);
  margin-top: -2px;
  margin-left: 1px;
}

.t-body { flex: 1; min-width: 0; }

.t-text {
  font-size: 12px;
  line-height: 1.4;
  font-weight: 400;
}

.ti-design .t-text { color: #1E1660; }
.ti-front .t-text  { color: #072E20; }
.ti-back .t-text   { color: #3C2005; }
.ti-dados .t-text  { color: #3A1008; }
.ti-text .t-text   { color: #071E38; }
.ti-sup .t-text    { color: #1C1A18; }
.ti-aprov .t-text  { color: #3A0820; }

.t-text.done-s { text-decoration: line-through; opacity: 0.45; }

.t-meta {
  font-size: 10px;
  margin-top: 2px;
  font-family: var(--font-mono);
  opacity: 0.6;
}

.ti-design .t-meta { color: var(--c-design); }
.ti-front .t-meta  { color: var(--c-front); }
.ti-back .t-meta   { color: var(--c-back); }
.ti-dados .t-meta  { color: var(--c-dados); }
.ti-text .t-meta   { color: var(--c-text-c); }
.ti-sup .t-meta    { color: var(--c-sup); }
.ti-aprov .t-meta  { color: var(--c-aprov); }

.t-del {
  opacity: 0;
  font-size: 11px;
  cursor: pointer;
  color: var(--c-text3);
  padding: 1px 4px;
  border-radius: 3px;
  transition: opacity var(--transition);
  flex-shrink: 0;
  line-height: 1;
  margin-top: 1px;
}

.task-item:hover .t-del { opacity: 0.5; }
.t-del:hover { opacity: 1 !important; background: rgba(0,0,0,0.06); }

.empty-tasks {
  font-size: 11px;
  color: var(--c-text3);
  padding: 8px 0;
  font-style: italic;
}

/* ─── Add Form ──────────────────────────────────── */
.add-form {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 10px;
  padding: 10px 12px;
  border: 1px dashed var(--c-border2);
  border-radius: var(--radius-md);
  background: var(--c-bg);
}

.add-form select,
.add-form input[type=text] {
  border: 1px solid var(--c-border2);
  border-radius: var(--radius-sm);
  padding: 5px 9px;
  font-size: 11px;
  background: var(--c-surface);
  color: var(--c-text);
  font-family: var(--font-main);
  outline: none;
  transition: border-color var(--transition);
}

.add-form select:focus,
.add-form input[type=text]:focus {
  border-color: var(--c-text);
}

.add-form input[type=text] {
  flex: 1;
  min-width: 120px;
}

.add-form input::placeholder { color: var(--c-text3); }

/* ─── Side cards ────────────────────────────────── */
.team-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;

  to   { opacity: 1; transform: translateY(0); }

  display: flex;

function av(name, sz = 24, fs = 10) {
  const m = MEMBERS[name] || { bg: '#F0EDE8', color: '#4A4845' };

function isBlocked(stages, key) {
  const st = STAGES.find(s => s.key === key);
  if (!st || !st.dep) return false;
  return stages[st.dep]?.status !== 'done';
}

  Object.entries(PROJECTS).forEach(([key, proj]) => {
    const n = openCount(key);
    html += `<div class="nav-proj${DATA.proj===key?' active':''}" data-proj="${key}" style="--proj-color:${proj.color}">
      <div class="proj-dot" style="background:${proj.color}"></div>
      <div class="proj-name">${proj.name.replace('— ','')}</div>
      ${n ? `<div class="proj-badge">${n}</div>` : ''}
    </div>`;
  });

  // Members
  html += `<div class="divider"></div>`;
  html += `<div class="sb-section">Eu sou</div>`;

  const roleOrder = ['Design','Frontend','Backend','Correção textual','Supervisão inicial','Supervisão final','Aprovação DMAPE','Aprovação de área'];
  const sorted = Object.entries(MEMBERS).sort((a,b) => roleOrder.indexOf(a[1].role) - roleOrder.indexOf(b[1].role));

  sorted.forEach(([name, m]) => {
    html += `<div class="nav-member${DATA.me===name?' active':''}" data-who="${name}">
      <div class="avatar" style="width:20px;height:20px;font-size:8px;background:${m.bg};color:${m.color}">${name.slice(0,2)}</div>
      <div class="m-name">${name}</div>
      <div class="m-role">${m.role.split(' ')[0]}</div>

  });

    const n = openCount(k);

  const totalT = Object.values(stgs).reduce((s,st) => s + st.tasks.length, 0);
  const doneT  = Object.values(stgs).reduce((s,st) => s + st.tasks.filter(t=>t.done).length, 0);
  const myT    = Object.values(stgs).reduce((s,st) => s + st.tasks.filter(t=>t.who===DATA.me&&!t.done).length, 0);

  // Pipeline HTML
  const pipelineHtml = `<div class="pipeline">
    ${STAGES.map((st, i) => {
      const s  = stgs[st.key];
      const sm = STATUS_META[s.status];
      const assigned = [...new Set(s.tasks.map(t=>t.who))].slice(0,4);
      return `<div class="pipe-stage${DATA.activeStage===st.key?' active':''}" data-stage="${st.key}">
        <div class="ps-num">${i+1}</div>
        <div class="ps-name">${st.short}</div>
        <div class="ps-status">
          <div class="status-dot ${sm.dot}"></div>
          <span>${s.tasks.length}t · ${sm.label}</span>
        </div>
        <div class="ps-avatars">
          ${assigned.map(n => {
            const m = MEMBERS[n] || { bg:'#eee', color:'#888' };
            return `<div class="ps-av" style="background:${m.bg};color:${m.color}">${n.slice(0,2)}</div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;

  // Context notice
  let noticeHtml = '';
  if (blocked) {
    noticeHtml = `<div class="notice blocked"><strong>Bloqueado</strong> — aguardando conclusão de "<strong>${depSt?.name}</strong>".</div>`;
  } else if (stInfo.dep && stgs[stInfo.dep]?.status === 'done') {
    noticeHtml = `<div class="notice ready"><strong>Pré-requisito concluído</strong> — ${depSt?.name} está pronto. Este estágio pode avançar.</div>`;
  } else if (stInfo.key === 'aprov') {
    noticeHtml = `<div class="notice approval"><strong>Etapa de aprovação formal</strong> — requer aval de Camila (DMAPE) e da área responsável.</div>`;
  }

  // Status pills
  const statPills = Object.entries(STATUS_META).map(([k,v]) =>
    `<div class="sp s-${k}${stData.status===k?' sel-'+k:''}" data-ss="${k}">${v.label}</div>`
  ).join('');

  // Role legend
  const legend = `<div class="role-legend">
    ${[['design','#4A3F9F','Design'],['front','#0D6B4F','Frontend'],['back','#7A4A0A','Backend'],
       ['text','#14548A','Correção textual'],['sup','#4A4845','Supervisão'],['aprov','#8A2252','Aprovação']
      ].map(([,c,l]) => `<div class="rl"><div class="rl-dot" style="background:${c}"></div>${l}</div>`).join('')}
  </div>`;

  // Tasks
  const myTasks    = stData.tasks.filter(t => t.who === DATA.me);
  const otherTasks = stData.tasks.filter(t => t.who !== DATA.me);

  function taskEl(t) {
    const m   = MEMBERS[t.who] || { type:'back' };
    const css = TYPE_CSS[t.type] || TYPE_CSS[m.type] || 'ti-back';
    return `<div class="task-item ${css}">
      <div class="chk${t.done?' done':''}" data-cht="${t.id}"></div>
      <div class="t-body">
        <div class="t-text${t.done?' done-s':''}">${t.text}</div>
        <div class="t-meta">${TYPE_LABEL[t.type]||t.type} · ${t.who}</div>
      </div>
      <div class="t-del" data-del="${t.id}" title="Remover">✕</div>
    </div>`;
  }

  let tasksHtml = '';
  if (!stData.tasks.length) {
    tasksHtml = `<div class="empty-tasks">Nenhuma tarefa neste estágio.</div>`;
  } else if (myTasks.length) {
    tasksHtml = `<div class="sect-lbl">${av(DATA.me, 16, 7)} Para ${DATA.me}</div>
      ${myTasks.map(taskEl).join('')}
      ${otherTasks.length ? `<div class="sect-lbl" style="margin-top:10px">Para o time</div>${otherTasks.map(taskEl).join('')}` : ''}`;
  } else {
    tasksHtml = stData.tasks.map(taskEl).join('');
  }

  // Add form
  const addForm = `<div class="add-form">
    <select id="new-type" title="Área">
      <option value="design">Design</option>
      <option value="front">Frontend</option>
      <option value="back">Backend</option>
      <option value="dados">Dados</option>
      <option value="text">Correção textual</option>
      <option value="sup">Supervisão</option>
      <option value="aprov">Aprovação</option>
    </select>
    <select id="new-who" title="Responsável">
      ${Object.keys(MEMBERS).map(n => `<option${n===DATA.me?' selected':''}>${n}</option>`).join('')}
    </select>
    <input type="text" id="new-text" placeholder="Descreva a tarefa e pressione Enter…">
    <button class="btn btn-primary" data-add="1" style="font-size:11px;padding:5px 12px">+ Tarefa</button>
  </div>`;

  // Stage detail
  const stageOwners = stInfo.owners.join(', ');
  const stageHtml = `<div class="card">
    <div class="stage-header">
      <div class="stage-num-badge">${STAGES.indexOf(stInfo)+1} de ${STAGES.length}</div>
      <div class="stage-name">${stInfo.name}</div>
      <div class="stage-count">${stData.tasks.filter(t=>t.done).length}/${stData.tasks.length}</div>
      <div class="stage-owner-tag">${stageOwners}</div>
    </div>
    ${noticeHtml}
    ${legend}
    <div class="status-pills">${statPills}</div>
    ${tasksHtml}
    ${addForm}
  </div>`;

  // History
  let histHtml = '';
  if (proj.history.length) {
    histHtml = `<div class="card">
      <div class="card-label">Histórico de versões</div>
      ${proj.history.map((h, hi) => {
        const open = DATA.histOpen[hi];
        const stageRows = STAGES.map(st => {
          const ht = h.stages[st.key]?.tasks || [];
          if (!ht.length) return '';
          return `<div class="hist-sg">
            <div class="hist-sg-label">${st.name}</div>
            ${ht.map(t=>`<div class="hist-line">${t.who} — ${t.text}</div>`).join('')}
          </div>`;
        }).join('');
        return `<div class="hist-entry">
          <div class="hist-header" data-ht="${hi}">
            <div class="hist-badge">${h.ver}</div>
            <div class="hist-meta">${h.date} · ${h.author} · ${h.notes.slice(0,52)}${h.notes.length>52?'…':''}</div>
            <div class="hist-toggle">${open ? '▲' : '▼'}</div>
          </div>
          ${open ? `<div class="hist-body">${stageRows}</div>` : ''}
        </div>`;
      }).join('')}
    </div>`;
  }

  // New version form
  const nvForm = `<div class="nv-form${DATA.nvOpen?' open':''}" id="nv-form">
    <div class="nv-title">Publicar nova versão</div>
    <div class="nv-grid">
      <div class="form-group">
        <label class="form-label">Número da versão</label>
        <input class="form-control" type="text" id="u-ver" placeholder="Ex: v2.2">
      </div>
      <div class="form-group">
        <label class="form-label">Responsável</label>
        <select class="form-control" id="u-author">
          ${Object.keys(MEMBERS).map(n=>`<option${n===DATA.me?' selected':''}>${n}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">O que mudou nessa versão?</label>
      <textarea class="form-control" id="u-notes" placeholder="Descreva as principais alterações…"></textarea>
    </div>
    <div class="nv-footer">
      <button class="btn" data-nvcancel="1">Cancelar</button>
      <button class="btn btn-primary" data-nvsave="1">Publicar e reiniciar pipeline →</button>
    </div>
  </div>`;

  // Right column — Team
  const teamCard = `<div class="card">
    <div class="card-label">Equipe</div>
    ${Object.entries(MEMBERS).map(([name, m]) => {
      const open = Object.values(stgs).reduce((s,st)=>s+st.tasks.filter(t=>t.who===name&&!t.done).length, 0);
      return `<div class="team-row">
        <div class="avatar" style="width:24px;height:24px;font-size:9px;background:${m.bg};color:${m.color}">${name.slice(0,2)}</div>
        <div class="tr-info">
          <div class="tr-name">${name}</div>
          <div class="tr-role">${m.role}</div>
        </div>
        ${open ? `<div class="tr-count">${open}</div>` : `<div class="tr-ok">✓</div>`}
      </div>`;
    }).join('')}
  </div>`;

  // Right column — Activity
  const actCard = `<div class="card">
    <div class="card-label">Atividade</div>
    ${(proj.activity||[]).slice(0,5).map(a => {
      const m = MEMBERS[a.who] || { bg:'#eee', color:'#888' };
      return `<div class="act-item">
        <div class="avatar" style="width:22px;height:22px;font-size:9px;background:${m.bg};color:${m.color};flex-shrink:0">${a.who.slice(0,2)}</div>
        <div class="act-body">
          <strong>${a.who}</strong> ${a.text}
          <span class="act-time">${a.time}</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;

  // Right column — Notes
  const notesCard = `<div class="notes-card" style="background:${projMeta.color}0C;border-color:${projMeta.color}40;">
    <div class="card-label" style="color:${projMeta.color}">Versão ${cur.ver}</div>
    <div class="notes-text" style="color:#4A4845">${cur.notes}</div>
  </div>`;

  // Doc header
  const docCard = `<div class="card">
    <div class="doc-header">
      <div class="doc-thumb">
        <div class="doc-thumb-top" style="background:${projMeta.color}20;color:${projMeta.color}">
          ${cur.ver}
        </div>
        <div class="doc-thumb-lines">
          ${[80,55,90,70,85,60,75,90].map(w=>`<div class="dl" style="width:${w}%"></div>`).join('')}
        </div>
      </div>
      <div class="doc-info">
        <div class="doc-title">${projMeta.name}</div>
        <div class="doc-desc">${proj.desc}</div>
        <div class="doc-tags">
          <span class="tag" style="background:${projMeta.color}15;color:${projMeta.color};border-color:${projMeta.color}50">${cur.ver}</span>
          <span class="tag">${cur.date}</span>
          <span class="tag">por ${cur.author}</span>
        </div>
      </div>
      <div class="doc-stats">
        <div class="stat-item"><span class="stat-label">Tarefas</span><span class="stat-val">${totalT}</span></div>
        <div class="stat-item"><span class="stat-label">Feitas</span><span class="stat-val">${doneT}</span></div>
        <div class="stat-item"><span class="stat-label">Minhas</span><span class="stat-val" style="color:${myT>0?'#D83A3A':'#1D9E75'}">${myT}</span></div>
      </div>
    </div>
  </div>`;

  // Assemble
  document.getElementById('content').innerHTML = `
    <div class="layout-cols">
      <div class="col-main">
        ${nvForm}
        ${docCard}
        ${pipelineHtml}
        ${stageHtml}
        ${histHtml}
      </div>
      <div class="col-side">
        ${teamCard}
        ${actCard}
        ${notesCard}
      </div>
    </div>`;

  attachEvents();
}

/* ═══════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════ */
function attachEvents() {
  // Project nav
  document.querySelectorAll('[data-proj]').forEach(el => el.addEventListener('click', () => {
    DATA.proj = el.dataset.proj;
    DATA.activeStage = 'dados';
    DATA.histOpen = {};
    DATA.nvOpen = false;
    document.querySelectorAll('[data-proj]').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    render();
  }));

  // Member nav
  document.querySelectorAll('[data-who]').forEach(el => el.addEventListener('click', () => {
    DATA.me = el.dataset.who;
    document.querySelectorAll('[data-who]').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    render();
  }));

  // Pipeline stage click
  document.querySelectorAll('.pipe-stage').forEach(el => el.addEventListener('click', () => {
    DATA.activeStage = el.dataset.stage;
    render();
  }));

  // Status pills
  document.querySelectorAll('[data-ss]').forEach(el => el.addEventListener('click', () => {
    const proj = DATA.projects[DATA.proj];
    proj.versions[0].stages[DATA.activeStage].status = el.dataset.ss;
    proj.activity.unshift({ who: DATA.me, text: `marcou "${DATA.activeStage}" como ${el.textContent}`, time: 'Agora' });
    render();
  }));

  // Check task
  document.querySelectorAll('[data-cht]').forEach(el => el.addEventListener('click', () => {
    const id = parseInt(el.dataset.cht);
    const proj = DATA.projects[DATA.proj];
    const cur  = proj.versions[0];
    for (const st of STAGES) {
      const t = cur.stages[st.key].tasks.find(t => t.id === id);
      if (t) {
        t.done = !t.done;
        proj.activity.unshift({ who: DATA.me, text: `${t.done?'concluiu':'reabriu'}: ${t.text.slice(0,42)}…`, time: 'Agora' });
        break;
      }
    }
    render();
  }));

  // Delete task
  document.querySelectorAll('[data-del]').forEach(el => el.addEventListener('click', () => {
    const id  = parseInt(el.dataset.del);
    const cur = DATA.projects[DATA.proj].versions[0];
    STAGES.forEach(st => { cur.stages[st.key].tasks = cur.stages[st.key].tasks.filter(t => t.id !== id); });
    render();
  }));

  // Add task
  const addBtn = document.querySelector('[data-add]');
  if (addBtn) {
    const submit = () => {
      const type = document.getElementById('new-type').value;
      const who  = document.getElementById('new-who').value;
      const text = document.getElementById('new-text').value.trim();
      if (!text) return;
      const proj = DATA.projects[DATA.proj];
      proj.versions[0].stages[DATA.activeStage].tasks.push({ id: NID++, type, who, text, done: false });
      proj.activity.unshift({ who: DATA.me, text: `criou: ${text.slice(0,42)}…`, time: 'Agora' });
      render();
      setTimeout(() => { const el = document.getElementById('new-text'); if(el) el.focus(); }, 50);
    };
    addBtn.addEventListener('click', submit);
    const nt = document.getElementById('new-text');
    if (nt) nt.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  }

  // New version toggle
  document.getElementById('btn-nv').addEventListener('click', () => {
    DATA.nvOpen = !DATA.nvOpen;
    render();
  });

  const nvcancel = document.querySelector('[data-nvcancel]');
  if (nvcancel) nvcancel.addEventListener('click', () => { DATA.nvOpen = false; render(); });

  const nvsave = document.querySelector('[data-nvsave]');
  if (nvsave) nvsave.addEventListener('click', () => {
    const ver    = document.getElementById('u-ver').value.trim();
    const author = document.getElementById('u-author').value;
    const notes  = document.getElementById('u-notes').value.trim();
    if (!ver || !author) return;
    const proj = DATA.projects[DATA.proj];
    proj.history.unshift(JSON.parse(JSON.stringify(proj.versions[0])));
    proj.versions[0] = { ver, date: today(), author, notes: notes || '—', stages: mkStages() };
    proj.activity.unshift({ who: author, text: `publicou versão ${ver}`, time: 'Agora' });
    DATA.nvOpen = false;
    DATA.activeStage = 'dados';
    DATA.histOpen = {};
    render();
  });

  // History toggle
  document.querySelectorAll('[data-ht]').forEach(el => el.addEventListener('click', () => {
    const i = parseInt(el.dataset.ht);
    DATA.histOpen[i] = !DATA.histOpen[i];
    render();
  }));
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
render();
</script>
</body>
</html>
