<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MEC Tracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family:sans-serif; text-align:center; padding-top:50px; background:#f4f2ec;">
    <div style="background:white; padding:30px; display:inline-block; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1)">
        <h2>SEGAPE Login</h2>
        <input type="email" id="email" placeholder="E-mail" style="display:block; margin:10px auto; padding:10px; width:250px">
        <input type="password" id="password" placeholder="Senha" style="display:block; margin:10px auto; padding:10px; width:250px">
        <button onclick="login()" style="padding:10px 30px; background:#003087; color:white; border:none; cursor:pointer; font-weight:bold">ENTRAR NO SISTEMA</button>
        <div id="msg" style="margin-top:20px; color:red; font-size:14px"></div>
    </div>

    <script>
        // Use os dados do seu NOVO projeto aqui:
        const URL_S = 'https://zvfwjuooztjeuokesfek.supabase.co'; 
        const KEY_S = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2ZndqdW9venRqZXVva2VzZmVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODgxNjQsImV4cCI6MjA5MTA2NDE2NH0.9M6w9bnLN2DbtGGHH3yn6dYXYvupavYjrg3D1fQGE00';

        // CONFIRMAÇÃO DE CARREGAMENTO
        window.onload = () => { console.log("Script carregado com sucesso!"); };

        const supabase = window.supabase.createClient(URL_S, KEY_S);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('msg');

            msgDiv.innerText = "Processando...";
            msgDiv.style.color = "blue";

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                
                if (error) {
                    msgDiv.innerText = "Erro: " + error.message;
                    msgDiv.style.color = "red";
                } else {
                    msgDiv.innerText = "LOGADO! Redirecionando...";
                    msgDiv.style.color = "green";
                    alert("Sucesso! Bem-vindo, " + data.user.email);
                }
            } catch (err) {
                msgDiv.innerText = "Erro de conexão: " + err.message;
            }
        }
    </script>
</body>
</html>
